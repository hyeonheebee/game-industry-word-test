const XP_CARD = 5;

const XP_PERFECT = 50;
const LEVELS = [
  { lv:1, title:"🌿 용어의 황야를 헤매는 자",     minXP:0    },
  { lv:2, title:"🗡️ 회의실에서 살아남은 견습사",  minXP:100  },
  { lv:3, title:"🗺️ 메타를 읽기 시작한 탐험가",  minXP:300  },
  { lv:4, title:"🔮 DAU를 조각하는 전략의 현자",  minXP:700  },
  { lv:5, title:"👑 업계에 이름을 새긴 전설",     minXP:1500 },
];
const getLevelInfo = (xp) => {
  let cur = LEVELS[0];
  for (const lv of LEVELS) { if (xp >= lv.minXP) cur = lv; }
  const next = LEVELS.find(lv => lv.minXP > xp);
  const pct = next ? Math.round(((xp - cur.minXP) / (next.minXP - cur.minXP)) * 100) : 100;
  return { ...cur, next, pct, xp };
};

function ThemeSelectScreen({ allTerms, onConfirm }) {

  const toggle = (id) => setSelected(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  return (
    <div className="min-h-screen px-4 py-8 max-w-lg mx-auto">

      <div className="grid grid-cols-2 gap-3 mb-4">
        {CATEGORIES.map(cat => {
          const active = selected.includes(cat.id);
          return (
            <button key={cat.id} onClick={() => toggle(cat.id)}
              className={`p-4 rounded-2xl border-2 text-left transition-all active:scale-95 ${active ? cat.activeBg + " " + cat.border : "bg-white/5 border-white/10"}`}>
              <div className="text-3xl mb-2">{cat.emoji}</div>
              <div className="text-white font-semibold text-sm">{cat.name}</div>
              <div className="text-gray-400 text-xs mt-1">{cat.desc}</div>

            </button>
          );
        })}
      </div>
      <button onClick={() => setSelected(s => s.length === CATEGORIES.length ? [] : CATEGORIES.map(c => c.id))}
        className="w-full text-gray-400 text-sm py-2 mb-4 hover:text-white transition">
        {selected.length === CATEGORIES.length ? "전체 해제" : "전체 선택"}

// ── MiniQuiz (단어장 내 팝업) ────────────────────────────────────────
function MiniQuiz({ recentTerms, allTerms, onClose, onWrong }) {
  const [term] = useState(() => recentTerms[Math.floor(Math.random() * recentTerms.length)]);
  const [opts] = useState(() => {
    const wrong = shuffle(allTerms.filter(t => t.id !== term.id)).slice(0, 1);
    return shuffle([term, ...wrong]);
  });
  const [selected, setSelected] = useState(null);
  const answered = selected !== null;

  const choose = (opt) => {
    if (answered) return;
    setSelected(opt.id);
    if (opt.id !== term.id) onWrong(term.id);
  };

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center px-4 z-50">
      <div className="bg-gray-900 border border-violet-500/40 rounded-3xl p-6 w-full max-w-sm fade-in">
        <div className="flex items-center justify-between mb-4">
          <span className="text-violet-400 text-sm font-semibold">⚡ 미니퀴즈</span>
          <button onClick={onClose} className="text-gray-500 hover:text-white text-sm">건너뛰기</button>
        </div>
        <p className="text-gray-300 text-sm mb-4">{term.definition}</p>
        <div className="flex flex-col gap-2">
          {opts.map(opt => {
            const isCorrect = opt.id === term.id;
            const isSelected = selected === opt.id;
            let cls = "w-full py-3 px-4 rounded-xl border text-left text-white text-sm font-semibold transition active:scale-95 ";
            if (!answered) cls += "bg-white/5 border-white/20 hover:bg-white/10";
            else if (isCorrect) cls += "bg-emerald-800/40 border-emerald-400";
            else if (isSelected) cls += "shake bg-red-900/40 border-red-400";
            else cls += "bg-white/5 border-white/10 opacity-40";
            return <button key={opt.id} className={cls} onClick={() => choose(opt)}>{opt.term}</button>;
          })}
        </div>
        {answered && (
          <div className="mt-4">
            <p className="text-xs text-gray-400">{term.funFact}</p>
            <button onClick={onClose} className="w-full mt-3 py-2 rounded-xl bg-violet-600 text-white text-sm font-bold transition active:scale-95">
              {selected === term.id ? "정답! 계속 →" : "확인, 계속 →"}
            </button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── shareCard (Canvas → PNG 다운로드) ───────────────────────────────
async function shareCard(term) {
  await ensureKoreanFont();
  const cat = getCat(term.category);
  const W = 600, H = 380;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");
  // 배경
  ctx.fillStyle = "#0f0f1a";
  ctx.fillRect(0, 0, W, H);
  // 테두리
  ctx.strokeStyle = "#7c3aed";
  ctx.lineWidth = 3;
  ctx.strokeRect(8, 8, W - 16, H - 16);
  // 카테고리
  ctx.fillStyle = "#9ca3af";
  ctx.font = "16px 'Noto Sans KR'";
  ctx.fillText(`${cat?.emoji} ${cat?.name}`, 36, 50);
  // 용어
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 48px 'Noto Sans KR'";
  ctx.fillText(term.term, 36, 112);
  // 풀네임
  if (term.termFull) {
    ctx.fillStyle = "#6b7280";
    ctx.font = "16px 'Noto Sans KR'";
    ctx.fillText(term.termFull, 36, 142);
  }
  // 구분선
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(36, 162); ctx.lineTo(W - 36, 162); ctx.stroke();
  // 정의 (줄바꿈)
  ctx.fillStyle = "#e5e7eb";
  ctx.font = "20px 'Noto Sans KR'";
  const words = term.definition.split(" ");
  let line = "", y = 196;
  for (const w of words) {
    const test = line + w + " ";
    if (ctx.measureText(test).width > W - 72 && line) {
      ctx.fillText(line.trim(), 36, y); line = w + " "; y += 30;
    } else { line = test; }
  }
  ctx.fillText(line.trim(), 36, y);
  // 브랜딩
  ctx.fillStyle = "#374151";
  ctx.font = "13px 'Noto Sans KR'";
  ctx.fillText("문의는 KDC 팀 - 심현희 로 보내주세요.  |  게임업계 생존단어장 · KRAFTON", 36, H - 24);
  // 다운로드
  const a = document.createElement("a");
  a.download = `${term.term}_card.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
}

async function shareRank(progress) {
  await ensureKoreanFont();
  const lv = getLevelInfo(progress.xp || 0);
  const streak = progress.streakDays || 0;
  const collected = (progress.collectedTermIds || []).length;
  const W = 600, H = 420;
  const canvas = document.createElement("canvas");
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext("2d");

  // 배경
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, "#0f0f1a");
  bg.addColorStop(1, "#1a0f2e");
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // 테두리 그라디언트
  const border = ctx.createLinearGradient(0, 0, W, H);
  border.addColorStop(0, "#7c3aed");
  border.addColorStop(1, "#3b82f6");
  ctx.strokeStyle = border;
  ctx.lineWidth = 3;
  ctx.strokeRect(8, 8, W - 16, H - 16);

  // 헤더
  ctx.fillStyle = "#6b7280";
  ctx.font = "15px 'Noto Sans KR'";
  ctx.fillText("🎮  게임업계 생존단어장", 36, 52);

  // 레벨
  ctx.fillStyle = "#ffffff";
  ctx.font = "bold 22px 'Noto Sans KR'";
  ctx.fillText(`Lv.${lv.lv}`, 36, 110);

  // 칭호
  ctx.fillStyle = "#c4b5fd";
  ctx.font = "bold 28px 'Noto Sans KR'";
  ctx.fillText(lv.title, 36, 155);

  // XP 바 배경
  const barX = 36, barY = 178, barW = W - 72, barH = 14;
  ctx.fillStyle = "#1f2937";
  ctx.beginPath();
  ctx.roundRect(barX, barY, barW, barH, 7);
  ctx.fill();

  // XP 바 채우기
  const filled = Math.max(8, (lv.pct / 100) * barW);
  const xpGrad = ctx.createLinearGradient(barX, 0, barX + filled, 0);
  xpGrad.addColorStop(0, "#7c3aed");
  xpGrad.addColorStop(1, "#60a5fa");
  ctx.fillStyle = xpGrad;
  ctx.beginPath();
  ctx.roundRect(barX, barY, filled, barH, 7);
  ctx.fill();

  // XP 수치
  ctx.fillStyle = "#9ca3af";
  ctx.font = "13px 'Noto Sans KR'";
  ctx.fillText(`${lv.xp} XP`, barX, barY + barH + 20);
  if (lv.next) {
    const txt = `다음 칭호까지 ${lv.next.minXP - lv.xp} XP`;
    const tw = ctx.measureText(txt).width;
    ctx.fillText(txt, barX + barW - tw, barY + barH + 20);
  }

  // 구분선
  ctx.strokeStyle = "#1f2937";
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(36, 230); ctx.lineTo(W - 36, 230); ctx.stroke();

  // 통계
  const stats = [
    { icon: "🔥", label: "연속 출석", value: `${streak}일` },
    { icon: "📦", label: "컬렉션", value: `${collected}개` },
  ];
  stats.forEach((s, i) => {
    const x = 36 + i * 200;
    ctx.fillStyle = "#6b7280";
    ctx.font = "13px 'Noto Sans KR'";
    ctx.fillText(`${s.icon}  ${s.label}`, x, 268);
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold 26px 'Noto Sans KR'";
    ctx.fillText(s.value, x, 306);
  });

  // 브랜딩
  ctx.fillStyle = "#374151";
  ctx.font = "13px 'Noto Sans KR'";
  ctx.fillText("문의는 KDC 팀 - 심현희 로 보내주세요.  |  게임업계 생존단어장", 36, H - 28);

  const a = document.createElement("a");
  a.download = `rank_lv${lv.lv}.png`;
  a.href = canvas.toDataURL("image/png");
  a.click();
}

function LearnMode({ terms, allTerms, wrongTermIds, bookmarkedTermIds, onExit, onWrong, onBookmark, onXP }) {
  const [index, setIndex] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [done, setDone] = useState(false);
  const [showMini, setShowMini] = useState(false);
  const [seenCount, setSeenCount] = useState(0);
  const [recentSeen, setRecentSeen] = useState([]);
  const [shareToast, setShareToast] = useState(false);

  const term = terms[index];
  const cat = getCat(term?.category);
  const isWrong = wrongTermIds.includes(term?.id);
  const isBookmarked = bookmarkedTermIds.includes(term?.id);

  const handleShare = (e) => {
    e.stopPropagation();
    shareCard(term);
    setShareToast(true);
    setTimeout(() => setShareToast(false), 2000);
  };

  useEffect(() => { setFlipped(false); }, [index]);

  const next = () => {
    if (onXP) onXP(XP_CARD);
    const newSeen = [...new Set([...recentSeen, term.id])];
    setRecentSeen(newSeen);
    const newCount = seenCount + 1;
    setSeenCount(newCount);
    if (newCount % 4 === 0 && newSeen.length >= 2) { setShowMini(true); return; }
    if (index === terms.length - 1) { setDone(true); return; }
    setIndex(i => i + 1);
  };

  const afterMini = () => {
    setShowMini(false);
    if (index === terms.length - 1) { setDone(true); return; }
    setIndex(i => i + 1);
  };

  if (done) return (
    <div className="min-h-screen flex flex-col items-center justify-center px-6 text-center">
      <div className="text-6xl mb-4">🎉</div>
      <h2 className="text-3xl font-bold text-white mb-2">모두 봤어요!</h2>
      <p className="text-gray-400 mb-8">{terms.length}개 용어 완주</p>
      <div className="flex flex-col gap-3 w-full max-w-xs">
        <button onClick={() => { setIndex(0); setDone(false); setSeenCount(0); setRecentSeen([]); }} className="w-full py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold transition">다시 보기</button>
        <button onClick={() => onExit("test_hub")} className="w-full py-4 rounded-2xl bg-violet-600 hover:bg-violet-500 text-white font-bold transition">테스트 해보기 ⚡</button>
      </div>
    </div>
  );

  if (!term) return null;

  return (
    <>
      {showMini && (
        <MiniQuiz
          recentTerms={recentSeen.map(id => terms.find(t => t.id === id)).filter(Boolean)}
          allTerms={terms}
          onClose={afterMini}
          onWrong={onWrong}
        />
      )}
      <div className="min-h-screen flex flex-col px-4 py-6 max-w-lg mx-auto">
        {shareToast && (
          <div className="fixed top-4 left-1/2 -translate-x-1/2 bg-violet-700 text-white text-sm px-4 py-2 rounded-xl z-50 fade-in">
            📥 이미지 저장됨
          </div>
        )}
        <div className="flex items-center justify-between mb-4">
          <button onClick={() => onExit("mode_split")} className="text-gray-400 hover:text-white text-sm">← 나가기</button>
          <span className="text-gray-400 text-sm">{index + 1} / {terms.length}</span>
          <div className="flex items-center gap-2">
            {isWrong && <span className="text-red-400 text-xs bg-red-900/30 px-2 py-1 rounded-full">복습 필요</span>}
            <button onClick={(e) => { e.stopPropagation(); onBookmark(term.id); }}
              className={`text-xl transition active:scale-90 ${isBookmarked ? "text-amber-400" : "text-gray-600 hover:text-amber-400"}`}>
              {isBookmarked ? "⭐" : "☆"}
            </button>
            <button onClick={handleShare} className="text-gray-500 hover:text-white text-lg transition active:scale-90">📤</button>
          </div>
        </div>
        <div className="w-full bg-white/10 rounded-full h-1.5 mb-6">
          <div className="h-1.5 rounded-full bg-violet-500 transition-all" style={{ width: `${((index + 1) / terms.length) * 100}%` }} />
        </div>
        <div className="card-container flex-1 min-h-[420px] cursor-pointer" onClick={() => setFlipped(f => !f)}>
          <div className={`card-inner h-full ${flipped ? "flipped" : ""}`} style={{ minHeight: 420 }}>
            {/* 앞면 */}
            <div className="card-face bg-gray-900 border border-white/10 rounded-3xl p-6 flex flex-col" style={{ minHeight: 420 }}>
              <div className="flex items-center gap-2 mb-4">
                <span>{cat?.emoji}</span>
                <span className="text-xs text-gray-400">{cat?.name}</span>
                <span className={`ml-auto text-xs ${DIFF_COLOR[term.difficulty]}`}>{DIFF[term.difficulty]}</span>
              </div>
              <div className="flex-1 flex flex-col justify-center">
                <h2 className="text-4xl font-bold text-white mb-2">{term.term}</h2>
                {term.termFull && <p className="text-gray-400 text-sm mb-4">{term.termFull}</p>}
                <p className="text-gray-200 text-lg leading-relaxed">{term.definition}</p>
              </div>
              <div className="mt-4 bg-white/5 rounded-2xl p-4">
                <p className="text-gray-400 text-xs mb-1">💬 실전 예문</p>
                <p className="text-gray-300 text-sm">{term.example}</p>
              </div>
              <p className="text-center text-gray-600 text-xs mt-4">탭해서 fun fact 보기 →</p>
            </div>
            {/* 뒷면 */}
            <div className="card-face card-back-face bg-gray-900 border border-violet-500/30 rounded-3xl p-6 flex flex-col" style={{ minHeight: 420 }}>
              <div className="flex items-center gap-2 mb-4">
                <span className="text-violet-400 text-sm font-semibold">✨ Fun Fact</span>
                <span className={`ml-auto text-xs ${DIFF_COLOR[term.difficulty]}`}>{DIFF[term.difficulty]}</span>
              </div>
              <div className="flex-1 flex flex-col justify-center">
                <p className="text-white text-xl leading-relaxed">{term.funFact}</p>
              </div>
              {term.relatedTerms?.length > 0 && (
                <div className="mt-4">
                  <p className="text-gray-500 text-xs mb-2">관련 용어</p>
                  <div className="flex flex-wrap gap-2">
                    {term.relatedTerms.map(rid => {
                      const r = allTerms.find(t => t.id === rid);
                      return r ? <span key={rid} className="bg-white/10 text-gray-300 text-xs px-3 py-1 rounded-full">{r.term}</span> : null;
                    })}
                  </div>
                </div>
              )}
              <p className="text-center text-gray-600 text-xs mt-4">← 탭해서 돌아가기</p>
            </div>
          </div>
        </div>
        <div className="flex gap-3 mt-6">
          <button onClick={() => { setIndex(i => Math.max(0, i - 1)); }} disabled={index === 0}
            className="flex-1 py-4 rounded-2xl bg-white/10 text-white font-semibold disabled:opacity-30 active:scale-95 transition">
            ← 이전
          </button>
          <button onClick={next}
            className="flex-1 py-4 rounded-2xl bg-violet-600 hover:bg-violet-500 text-white font-bold active:scale-95 transition">
            {index === terms.length - 1 ? "완료 🎉" : "다음 →"}
          </button>
        </div>
      </div>
    </>
  );
}

function QuizMode({ terms, onFinish, onBack }) {
  const TOTAL = Math.min(10, terms.length);
  const [questions] = useState(() => shuffle(terms).slice(0, TOTAL).map(t => ({
    term: t,
    options: shuffle([t, ...shuffle(terms.filter(x => x.id !== t.id)).slice(0, 3)])
  })));
  const [qi, setQi] = useState(0);
  const [selected, setSelected] = useState(null);
  const [streak, setStreak] = useState(0);
  const [score, setScore] = useState(0);
  const [wrongIds, setWrongIds] = useState([]);
  const [animKey, setAnimKey] = useState(0);

  const current = questions[qi];
  const answered = selected !== null;

  const choose = (opt) => {
    if (answered) return;
    setSelected(opt.id);
    if (opt.id === current.term.id) { setScore(s => s + 1); setStreak(s => s + 1); }
    else { setStreak(0); setWrongIds(ids => [...ids, current.term.id]); }
    setAnimKey(k => k + 1);
  };

  const next = () => {
    if (qi + 1 >= TOTAL) { onFinish({ score, total: TOTAL, wrongIds }); return; }
    setSelected(null);
    setQi(i => i + 1);
  };

  return (
    <div className="min-h-screen flex flex-col px-4 py-6 max-w-lg mx-auto">
      <div className="flex items-center justify-between mb-4">
        <button onClick={onBack} className="text-gray-400 hover:text-white text-sm">← 나가기</button>
        <span className="text-gray-400 text-sm">{qi + 1} / {TOTAL}</span>
        <span key={animKey} className={`text-orange-400 font-bold text-sm ${streak > 0 ? "pop" : ""}`}>
          {streak > 1 ? `🔥 ${streak}연속` : `점수 ${score}`}
        </span>
      </div>
      <div className="w-full bg-white/10 rounded-full h-1.5 mb-6">
        <div className="h-1.5 rounded-full bg-violet-500 transition-all" style={{ width: `${((qi + 1) / TOTAL) * 100}%` }} />
      </div>
      <div className="bg-gray-900 border border-white/10 rounded-3xl p-6 mb-6">
        <p className="text-gray-400 text-xs mb-3">이 설명에 해당하는 용어는?</p>
        <p className="text-white text-lg font-semibold leading-relaxed">{current.term.definition}</p>
      </div>
      <div className="flex flex-col gap-3">
        {current.options.map(opt => {
          const isCorrect = opt.id === current.term.id;
          const isSelected = selected === opt.id;
          let cls = "w-full p-4 rounded-2xl border-2 text-left text-white font-semibold transition active:scale-95 ";
          if (!answered) cls += "bg-white/5 border-white/20 hover:bg-white/10";
          else if (isCorrect) cls += "bg-emerald-800/40 border-emerald-400";
          else if (isSelected) cls += "shake bg-red-900/40 border-red-400";
          else cls += "bg-white/5 border-white/10 opacity-40";
          return (
            <button key={opt.id} className={cls} onClick={() => choose(opt)}>
              {opt.term}
              {answered && isCorrect && <span className="ml-2 text-emerald-400">✓</span>}
              {answered && isSelected && !isCorrect && <span className="ml-2 text-red-400">✗</span>}
            </button>
          );
        })}
      </div>
      {answered && (
        <div className="mt-4 bg-gray-900 border border-white/10 rounded-2xl p-4 fade-in">
          <p className="text-violet-300 text-xs">{current.term.funFact}</p>
          <p className="text-gray-500 text-xs mt-2">{current.term.example}</p>
          <button onClick={next} className="w-full mt-3 py-3 rounded-xl bg-violet-600 hover:bg-violet-500 text-white font-bold transition active:scale-95">
            {qi + 1 >= TOTAL ? "결과 보기 →" : "다음 →"}
          </button>
        </div>
      )}
    </div>
  );
}

// ── QuizResult ──────────────────────────────────────────────────────
function QuizResult({ result, terms, onRetry, onLearnWrong, onHome }) {
  const pct = Math.round((result.score / result.total) * 100);
  const wrongTerms = terms.filter(t => result.wrongIds.includes(t.id));
  const emoji = pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪";
  const xpEarned = result.xpEarned || 0;
  const isPerfect = result.score === result.total;
  return (
    <div className="min-h-screen flex flex-col px-6 py-8 max-w-lg mx-auto">
      <div className="text-center mb-8">
        <div className="text-6xl mb-3">{emoji}</div>
        <h2 className="text-3xl font-bold text-white mb-1">{result.score} / {result.total}</h2>
        <p className="text-gray-400">{pct}% 정답</p>
        {xpEarned > 0 && (
          <div className="mt-3 inline-flex items-center gap-2 bg-violet-900/40 border border-violet-500/40 rounded-xl px-4 py-2">
            <span className="text-violet-300 font-bold">+{xpEarned} XP 획득</span>
            {isPerfect && <span className="text-yellow-400 text-xs">만점 보너스 포함 🌟</span>}
          </div>
        )}
      </div>
      {wrongTerms.length > 0 && (
        <div className="bg-red-900/20 border border-red-500/30 rounded-2xl p-4 mb-6">
          <p className="text-red-400 text-sm font-semibold mb-3">❌ 틀린 용어 ({wrongTerms.length}개)</p>
          {wrongTerms.map(t => (
            <div key={t.id} className="text-white text-sm py-2 border-b border-white/5 last:border-0">
              <span className="font-semibold">{t.term}</span>
              <span className="text-gray-400 ml-2 text-xs">{t.definition}</span>
            </div>
          ))}
        </div>
      )}
      <div className="flex flex-col gap-3">
        {wrongTerms.length > 0 && (
          <button onClick={onLearnWrong} className="w-full py-4 rounded-2xl bg-emerald-600 hover:bg-emerald-500 text-white font-bold transition active:scale-95">
            📖 틀린 용어 단어장에서 보기
          </button>
        )}
        <button onClick={onRetry} className="w-full py-4 rounded-2xl bg-violet-600 hover:bg-violet-500 text-white font-bold transition active:scale-95">다시 도전 ⚡</button>
        <button onClick={onHome} className="w-full py-4 rounded-2xl bg-white/10 text-white font-semibold transition active:scale-95">테마 다시 선택</button>
      </div>
    </div>
  );
}

function GachaScreen({ filteredTerms, onFinish, onBack, onXP }) {
  const [cards] = useState(() => shuffle(filteredTerms).slice(0, 3));
  const [flipped, setFlipped] = useState([false, false, false]);
  const [wobble, setWobble] = useState([true, true, true]);
  const allFlipped = flipped.every(Boolean);

  const flip = (i) => {
    if (flipped[i]) return;
    setFlipped(f => f.map((v, idx) => idx === i ? true : v));
    setWobble(w => w.map((v, idx) => idx === i ? false : v));
  };

  const rarityStyle = (d) => {
    if (d === 3) return "border-yellow-400 bg-yellow-900/20";
    if (d === 2) return "border-blue-400 bg-blue-900/20";
    return "border-gray-500 bg-gray-800/40";

  return (
    <div className="min-h-screen flex flex-col px-4 py-8 max-w-lg mx-auto">

        <div />

      <p className="text-gray-400 text-sm text-center mb-8">카드를 탭해서 뒤집어보세요</p>
      <div className="flex flex-col gap-4 flex-1">
        {cards.map((card, i) => (
          <div key={card.id} className={`card-container cursor-pointer ${wobble[i] ? "wobble" : ""}`}
            style={{ height: 130 }} onClick={() => flip(i)}>
            <div className={`card-inner w-full h-full ${flipped[i] ? "flipped" : ""}`}>
              {/* 뒷면 (초기 표시) */}
              <div className="card-face bg-gradient-to-br from-violet-900 to-indigo-900 border-2 border-violet-500/50 rounded-2xl flex items-center justify-center glow">
                <div className="text-center">
                  <div className="text-4xl mb-2">🎴</div>
                  <div className="text-gray-400 text-sm">탭해서 공개</div>
                </div>
              </div>
              {/* 앞면 (공개) */}
              <div className={`card-face card-back-face rounded-2xl border-2 p-5 flex flex-col justify-between ${rarityStyle(card.difficulty)}`}>
                <div className="flex items-start justify-between">
                  <div>
                    <div className="text-white font-bold text-xl">{card.term}</div>
                    {card.termFull && <div className="text-gray-400 text-xs">{card.termFull}</div>}
                  </div>
                  <span className={`text-sm ${DIFF_COLOR[card.difficulty]}`}>{DIFF[card.difficulty]}</span>
                </div>
                <p className="text-gray-300 text-sm leading-snug">{card.definition}</p>
              </div>
            </div>
          </div>
        ))}
      </div>
      {allFlipped && (
        <div className="mt-6 fade-in">
          <div className="bg-violet-900/30 border border-violet-500/30 rounded-2xl p-4 mb-4 text-center">
            <p className="text-violet-300 text-sm">✨ 컬렉션에 추가됐어요!</p>
            <p className="text-yellow-400 text-xs mt-1">+{XP_CARD * 3} XP 획득!</p>
          </div>
          <button onClick={() => { if (onXP) onXP(XP_CARD * 3); onFinish(cards.map(c => c.id)); }}

            완료 →

        </div>

  );
}

function App() {
  const [screen, setScreen] = useState("splash");
  const [selectedThemes, setSelectedThemes] = useState([]);
  const [selectedDifficulties, setSelectedDifficulties] = useState([1, 2, 3]);
  const [quizResult, setQuizResult] = useState(null);
  const [learnWrongOnly, setLearnWrongOnly] = useState(false);
  const [progress, setProgress] = useState(() => loadProgress());
  const [allTerms, setAllTerms] = useState(TERMS_BUILTIN);
  const [dataLoading, setDataLoading] = useState(true);
  const [dataSource, setDataSource] = useState("내장");
  const [levelUpInfo, setLevelUpInfo] = useState(null);

  useEffect(() => {
    const GITHUB_URL = "https://raw.githubusercontent.com/hyeonheebee/game-industry-word-test/main/terms.json";
    fetch(GITHUB_URL)
      .then(r => { if (!r.ok) throw new Error(); return r.json(); })
      .then(data => {
        if (data.terms && data.terms.length > 0) {
          setAllTerms(data.terms);
          setDataSource(`GitHub API (${data.terms.length}개)`);
        }
        setDataLoading(false);
      })
      .catch(() => {
        // GitHub 실패 시 상대경로 fallback
        fetch("terms.json")
          .then(r => r.json())
          .then(data => {
            if (data.terms?.length > 0) {
              setAllTerms(data.terms);
              setDataSource(`로컬 (${data.terms.length}개)`);
            }
            setDataLoading(false);
          })
          .catch(() => setDataLoading(false));
      });
  }, []);

  const toggleDifficulty = (level) => {
    setSelectedDifficulties(prev => {
      if (prev.includes(level) && prev.length === 1) return prev;
      return prev.includes(level) ? prev.filter(x => x !== level) : [...prev, level];
    });
  };

  const updateProgress = (patch) => {
    setProgress(prev => {
      const next = { ...prev, ...patch };
      saveProgress(next);
      return next;
    });
  };

  // addXP: state updater 안에서 side effect 금지 — 직접 읽기 패턴
  const addXP = (amount) => {
    const streak = progress.streakDays || 0;
    const multiplier = streak >= 7 ? 3 : streak >= 3 ? 2 : 1;
    const earned = amount * multiplier;
    const prevXP = progress.xp || 0;
    const prevLv = getLevelInfo(prevXP).lv;
    const newXP = prevXP + earned;
    const newLv = getLevelInfo(newXP).lv;
    if (newLv > prevLv) {
      setTimeout(() => setLevelUpInfo(getLevelInfo(newXP)), 300);
    }
    updateProgress({ xp: newXP });
  };

  // 출석 체크
  useEffect(() => {
    const p = loadProgress();
    const t = today();
    if (p.lastVisitDate === t) return;
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    const streak = p.lastVisitDate === yesterday ? (p.streakDays || 0) + 1 : 1;
    updateProgress({ lastVisitDate: t, streakDays: streak });
  }, []);

  if (dataLoading) return <LoadingScreen />;

  const filteredTerms = allTerms.filter(t => selectedThemes.includes(t.category) && selectedDifficulties.includes(t.difficulty));
  const wrongTermIds = progress.wrongTermIds || [];
  const learnTerms = learnWrongOnly
    ? filteredTerms.filter(t => wrongTermIds.includes(t.id))
    : filteredTerms;

  const handleWrong = (id) => {
    const newWrong = [...new Set([...wrongTermIds, id])];
    updateProgress({ wrongTermIds: newWrong });
  };

  const handleQuizFinish = (result) => {
    const streak = progress.streakDays || 0;
    const multiplier = streak >= 7 ? 3 : streak >= 3 ? 2 : 1;
    const baseXP = result.score * XP_QUIZ + (result.score === result.total ? XP_PERFECT : 0);
    const xpEarned = baseXP * multiplier;
    setQuizResult({ ...result, xpEarned });
    addXP(baseXP);
    const newWrong = [...new Set([...wrongTermIds, ...result.wrongIds])];
    const history = [...(progress.quizHistory || []).slice(-9), { date: today(), score: result.score, total: result.total }];
    updateProgress({ wrongTermIds: newWrong, quizHistory: history });
    setScreen("quiz_result");
  };

  const handleGachaFinish = (ids) => {
    const collected = [...new Set([...(progress.collectedTermIds || []), ...ids])];
    updateProgress({ collectedTermIds: collected, gachaLastDate: today() });
    setScreen("test_hub");
  };

  const handleLearnWrong = () => {
    setLearnWrongOnly(true);
    setScreen("learn");
  };

  const bookmarkedTermIds = progress.bookmarkedTermIds || [];

  const handleBookmark = (id) => {
    const cur = progress.bookmarkedTermIds || [];
    const next = cur.includes(id) ? cur.filter(x => x !== id) : [...cur, id];
    updateProgress({ bookmarkedTermIds: next });
  };

  return (
    <div className="text-white">
      {levelUpInfo && <LevelUpModal info={levelUpInfo} onClose={() => setLevelUpInfo(null)} />}
      {screen === "search" && <SearchScreen allTerms={allTerms} onBack={() => setScreen("splash")} />}
      {screen === "bookmarks" && (
        <BookmarksScreen
          allTerms={allTerms}
          bookmarkedTermIds={bookmarkedTermIds}
          onBack={() => setScreen("splash")}
          onRemove={handleBookmark}
        />
      )}
      {screen === "splash" && (
        <SplashScreen
          progress={progress}
          dataSource={dataSource}
          onStart={() => setScreen("theme_select")}
          onSearch={() => setScreen("search")}
          onBookmarks={() => setScreen("bookmarks")}
        />
      )}
      {screen === "theme_select" && (
        <ThemeSelectScreen allTerms={allTerms} onConfirm={(themes) => { setSelectedThemes(themes); setScreen("mode_split"); }} />
      )}
      {screen === "mode_split" && (
        <ModeSplitScreen
          allTerms={allTerms}
          selectedThemes={selectedThemes}
          selectedDifficulties={selectedDifficulties}
          onDifficultyChange={toggleDifficulty}
          onMode={(m) => { setLearnWrongOnly(false); setScreen(m === "test_hub" ? "test_hub" : "learn"); }}
          onChangeTheme={() => setScreen("theme_select")}
        />
      )}
      {screen === "test_hub" && (
        <TestHub filteredTerms={filteredTerms} progress={progress}
          onQuiz={() => setScreen("quiz")}
          onGacha={() => setScreen("gacha")}
          onBack={() => setScreen("mode_split")} />
      )}
      {screen === "learn" && (
        <LearnMode
          terms={learnTerms.length ? learnTerms : filteredTerms}
          allTerms={allTerms}
          wrongTermIds={wrongTermIds}
          bookmarkedTermIds={bookmarkedTermIds}
          onExit={(dest) => { setLearnWrongOnly(false); setScreen(dest || "mode_split"); }}
          onWrong={handleWrong}
          onBookmark={handleBookmark}
          onXP={addXP}
        />
      )}
      {screen === "quiz" && (
        <QuizMode terms={filteredTerms} onFinish={handleQuizFinish} onBack={() => setScreen("test_hub")} />
      )}
      {screen === "quiz_result" && quizResult && (
        <QuizResult result={quizResult} terms={filteredTerms}
          onRetry={() => setScreen("quiz")}
          onLearnWrong={handleLearnWrong}
          onHome={() => setScreen("theme_select")} />
      )}
      {screen === "gacha" && (
        <GachaScreen filteredTerms={filteredTerms} onFinish={handleGachaFinish} onBack={() => setScreen("test_hub")} onXP={addXP} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
